name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & upload (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin e --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf e-${{ matrix.target }}.tar.gz e
          shasum -a 256 e-${{ matrix.target }}.tar.gz > e-${{ matrix.target }}.tar.gz.sha256

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/e-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/e-${{ matrix.target }}.tar.gz.sha256

  linux:
    name: Build & upload (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # Floem (winit + wgpu/vello) + rfd + the DB drivers' TLS. Matches Floem's
      # own CI set, plus libssl for the MySQL driver.
      - name: Install system dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get -y install \
            clang pkg-config libssl-dev libwayland-dev libxkbcommon-x11-dev \
            libvulkan-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build release binary
        run: cargo build --release --bin e --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf e-${{ matrix.target }}.tar.gz e
          sha256sum e-${{ matrix.target }}.tar.gz > e-${{ matrix.target }}.tar.gz.sha256

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/e-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/e-${{ matrix.target }}.tar.gz.sha256

  dmg:
    name: Universal DMG installer
    runs-on: macos-latest
    env:
      # Present only when the repo has the signing secrets configured.
      HAS_CERT: ${{ secrets.MACOS_CERTIFICATE }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
      NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificate
        if: env.HAS_CERT != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: actions-build
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain >/dev/null
          rm -f cert.p12
          ID="$(security find-identity -v -p codesigning build.keychain \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          echo "CODESIGN_IDENTITY=$ID" >> "$GITHUB_ENV"
          echo "Using identity: $ID"

      - name: Build DMG
        run: ./scripts/bundle-dmg.sh --universal

      - name: Checksum
        run: |
          cd dist
          shasum -a 256 e-*-universal.dmg > "$(ls e-*-universal.dmg).sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/e-*-universal.dmg
            dist/e-*-universal.dmg.sha256
