<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242730"/>
      <stop offset="1" stop-color="#141318"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.46" cy="0.5" r="0.62">
      <stop offset="0" stop-color="#ff7a45" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff7a45" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="300" y1="280" x2="720" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9e63"/>
      <stop offset="0.55" stop-color="#f2613a"/>
      <stop offset="1" stop-color="#d6452a"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#glow)"/>
  <rect x="8" y="8" width="1008" height="1008" rx="226" ry="226" fill="none"
        stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <g filter="url(#soft)">
    <!-- the "e" as a heavy glyph -->
    <text x="356" y="700" text-anchor="middle"
          font-family="Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-weight="800" font-size="620"
          fill="url(#ink)">e</text>
    <!-- terminal block cursor (warm off-white) -->
    <rect x="612" y="380" width="96" height="300" rx="26" ry="26" fill="#f1ebe2"/>
  </g>
</svg>
